[package]
name = "rts"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = "0.18"
noise = "0.9"
rand = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Enable optimizations for dependencies in dev builds for acceptable framerate
[profile.dev.package."*"]
opt-level = 2
