server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WASM MIME type
    types {
        application/wasm wasm;
        application/javascript js;
        text/html html;
        text/css css;
        application/json json;
        image/png png;
        image/jpeg jpg jpeg;
        image/svg+xml svg;
        application/octet-stream bin glb gltf;
        font/woff2 woff2;
        font/woff woff;
        font/ttf ttf;
        audio/ogg ogg;
        audio/mpeg mp3;
    }

    # Gzip compression — critical for large WASM files
    gzip on;
    gzip_types application/wasm application/javascript text/html text/css application/json;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    # Required for SharedArrayBuffer / WebGPU multi-threading
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Cache hashed assets aggressively (1 year)
    location ~* \.(wasm|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Cache game assets
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
